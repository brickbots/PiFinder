name: Build PiFinder NixOS

on:
  # No `push:` trigger — direct pushes (mrosseel commits) must build nothing.
  # Builds run only on labeled PRs (brickbots contributions) and on demand;
  # pre-releases/releases build via release.yml.
  pull_request:
    types: [labeled, synchronize, opened]
  workflow_dispatch:
    inputs:
      migration_version:
        description: "Migration tarball version tag (e.g. 3.0.0)"
        required: false
        default: "3.0.0"
        type: string

concurrency:
  group: build-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Try Pi5 native build first (fast)
  build-native:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      contains(github.event.pull_request.labels.*.name, 'testable')
    runs-on: [self-hosted, aarch64]
    timeout-minutes: 30
    outputs:
      success: ${{ steps.build.outcome == 'success' }}
      store_path: ${{ steps.push.outputs.store_path }}
    steps:
      - uses: actions/checkout@v4

      - name: Ensure nix is on PATH (self-hosted runner)
        # GitHub Actions runs steps in a non-login shell that doesn't load
        # nix's profile, so neither `nix` (default profile) nor `attic`
        # (installed into the user profile by `nix profile install`) is found
        # unless we add both explicitly.
        run: |
          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Setup Attic substituter (cache.pifinder.eu)
        # Self-hosted FastCDC-chunked binary cache — see ADR 0004. The
        # `attic use` command writes the substituter + public key into
        # nix.conf so the build below substitutes from cache.pifinder.eu
        # before falling back to cache.nixos.org.
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix profile install nixpkgs#attic-client
          attic login pifinder https://cache.pifinder.eu "$ATTIC_TOKEN"
          attic use pifinder:pifinder

      - name: Build NixOS system closure
        id: build
        run: |
          nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            -L --no-link

      - name: Push to Attic
        id: push
        run: |
          STORE_PATH=$(nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            --json | jq -r '.[].outputs.out')
          attic push pifinder:pifinder "$STORE_PATH"
          echo "store_path=$STORE_PATH" >> "$GITHUB_OUTPUT"

  # Wait up to 15 min for native builder, then decide on fallback
  native-wait:
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      contains(github.event.pull_request.labels.*.name, 'testable')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      need_emulated: ${{ steps.wait.outputs.need_emulated }}
    steps:
      - name: Wait for native build
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 30); do
            sleep 30
            RESULT=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
              --jq '.jobs[] | select(.name == "build-native") | .conclusion // "pending"' 2>/dev/null || echo "pending")
            echo "Check $i/30: build-native=$RESULT"
            if [ "$RESULT" = "success" ]; then
              echo "need_emulated=false" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
              echo "need_emulated=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Native build not done after 15 min, falling back to emulated"
          echo "need_emulated=true" >> "$GITHUB_OUTPUT"

  # Fallback when the Pi5 is unavailable or slow: a free hosted arm64 runner
  # (public repos). Native aarch64 — no QEMU emulation. Job id kept as
  # `build-emulated` so downstream `needs:` references are unchanged.
  build-emulated:
    needs: native-wait
    if: needs.native-wait.outputs.need_emulated == 'true'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    outputs:
      store_path: ${{ steps.push.outputs.store_path }}
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            extra-system-features = big-parallel
            # Pull from the public Attic cache without a token (works on fork PRs).
            extra-substituters = https://cache.pifinder.eu/pifinder
            extra-trusted-public-keys = pifinder:VkemNaMqXDcsYlpONItSvOOcBIa1vEfnpyqdetr3gck=

      - name: Attic login for push (token only — skipped on fork PRs)
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          if [ -z "$ATTIC_TOKEN" ]; then
            echo "No ATTIC_TOKEN (fork PR) — pull-only via the public substituter"
            exit 0
          fi
          nix profile install nixpkgs#attic-client
          attic login pifinder https://cache.pifinder.eu "$ATTIC_TOKEN"
          attic use pifinder:pifinder

      - name: Build NixOS system closure
        run: |
          nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            -L --no-link

      - name: Push to Attic
        id: push
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          STORE_PATH=$(nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            --json | jq -r '.[].outputs.out')
          echo "store_path=$STORE_PATH" >> "$GITHUB_OUTPUT"
          if [ -n "$ATTIC_TOKEN" ]; then
            attic push pifinder:pifinder "$STORE_PATH"
          else
            echo "No ATTIC_TOKEN (fork PR) — skipping push; build is verify-only"
          fi

  # Commit generated update metadata to a metadata-only branch. This keeps the
  # source branch at the real source commit: no post-build stamp commits.
  update-manifest:
    needs: [build-native, build-emulated]
    if: |
      always() &&
      (needs.build-native.result == 'success' || needs.build-emulated.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize every manifest writer (build + release) so concurrent stamps do
    # not collide on the single update-manifest.json. publish_manifest.sh also
    # retries on a rejected push, so this group is an optimization, not the
    # correctness guarantee.
    concurrency:
      group: manifest-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update generated manifest branch
        env:
          STORE_PATH: ${{ needs.build-native.outputs.store_path || needs.build-emulated.outputs.store_path }}
          GH_REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.head_ref || github.ref_name }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PR_NUMBER="$(jq -r '.pull_request.number // ""' "$GITHUB_EVENT_PATH")"
          PR_TITLE="$(jq -r '.pull_request.title // ""' "$GITHUB_EVENT_PATH")"
          PR_BODY="$(jq -r '.pull_request.body // ""' "$GITHUB_EVENT_PATH")"
          HEAD_REPO="$(jq -r '.pull_request.head.repo.full_name // ""' "$GITHUB_EVENT_PATH")"
          HEAD_REF="$(jq -r '.pull_request.head.ref // ""' "$GITHUB_EVENT_PATH")"
          HEAD_SHA="$(jq -r '.pull_request.head.sha // ""' "$GITHUB_EVENT_PATH")"

          if [ "$EVENT_NAME" = "pull_request" ] && [ "$HEAD_REPO" != "$GH_REPOSITORY" ]; then
            echo "External fork PR: build verified, manifest update skipped (read-only token)"
            exit 0
          fi

          if [ -n "$PR_NUMBER" ]; then
            SHORT_SHA="${HEAD_SHA:0:7}"
            VERSION="PR#${PR_NUMBER}-${SHORT_SHA}"
          else
            SHORT_SHA="${SOURCE_SHA:0:7}"
            VERSION="${REF_NAME}-${SHORT_SHA}"
          fi

          .github/scripts/publish_manifest.sh \
            "chore: update build manifest [skip ci]" \
            python3 .github/scripts/update_manifest.py build \
              --manifest @MANIFEST@ \
              --repository "$GH_REPOSITORY" \
              --ref-name "$REF_NAME" \
              --sha "$SOURCE_SHA" \
              --store-path "$STORE_PATH" \
              --version "$VERSION" \
              --pr-number "$PR_NUMBER" \
              --pr-title "$PR_TITLE" \
              --pr-body "$PR_BODY" \
              --head-repo "${HEAD_REPO:-$GH_REPOSITORY}" \
              --head-ref "${HEAD_REF:-$REF_NAME}" \
              --head-sha "${HEAD_SHA:-$SOURCE_SHA}"

  # Build migration tarball — only on nixos branch pushes
  build-migration-tarball:
    needs: [build-native, build-emulated]
    if: |
      always() &&
      github.ref == 'refs/heads/nixos' &&
      (needs.build-native.result == 'success' || needs.build-emulated.result == 'success')
    runs-on: [self-hosted, aarch64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure nix is on PATH (self-hosted runner)
        # GitHub Actions runs steps in a non-login shell that doesn't load
        # nix's profile, so neither `nix` (default profile) nor `attic`
        # (installed into the user profile by `nix profile install`) is found
        # unless we add both explicitly.
        run: |
          echo "/nix/var/nix/profiles/default/bin" >> "$GITHUB_PATH"
          echo "$HOME/.nix-profile/bin" >> "$GITHUB_PATH"

      - name: Setup Attic substituter (cache.pifinder.eu)
        env:
          ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
        run: |
          nix profile install nixpkgs#attic-client
          attic login pifinder https://cache.pifinder.eu "$ATTIC_TOKEN"
          attic use pifinder:pifinder

      - name: Set version
        run: |
          if [ -n "${{ inputs.migration_version }}" ]; then
            echo "VERSION=${{ inputs.migration_version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=3.0.0" >> "$GITHUB_ENV"
          fi

      - name: Resolve full system store path
        run: |
          FULL_PATH="${{ needs.build-native.outputs.store_path || needs.build-emulated.outputs.store_path }}"
          echo "FULL_PATH=$FULL_PATH" >> "$GITHUB_ENV"
          echo "Full system toplevel: $FULL_PATH"

      - name: Build migration toplevel and boot firmware
        run: |
          MIGRATION_PATH=$(nix build \
            .#nixosConfigurations.pifinder-migration.config.system.build.toplevel \
            --json | jq -r '.[].outputs.out')
          echo "MIGRATION_PATH=$MIGRATION_PATH" >> "$GITHUB_ENV"
          echo "Migration toplevel: $MIGRATION_PATH"

          BOOT_FW=$(nix build .#packages.aarch64-linux.migration-boot-firmware \
            --json | jq -r '.[].outputs.out')
          echo "BOOT_FW=$BOOT_FW" >> "$GITHUB_ENV"
          echo "Boot firmware: $BOOT_FW"

      - name: Clean up previous runs
        run: |
          sudo rm -rf /tmp/tarball-staging
          rm -f /tmp/pifinder-nixos-*.tar.zst /tmp/pifinder-nixos-*.tar.zst.sha256

      - name: Assemble boot partition
        run: |
          set -euo pipefail
          mkdir -p /tmp/tarball-staging/boot/{nixos,extlinux}

          # RPi firmware, u-boot, config.txt, firmware DTBs
          cp "$BOOT_FW"/* /tmp/tarball-staging/boot/

          # Kernel, initrd, dtbs from migration toplevel
          KERNEL=$(readlink -f "$MIGRATION_PATH/kernel")
          INITRD=$(readlink -f "$MIGRATION_PATH/initrd")
          DTBS=$(readlink -f "$MIGRATION_PATH/dtbs")

          KERNEL_NAME=$(basename "$KERNEL")
          INITRD_NAME=$(basename "$INITRD")
          DTBS_NAME=$(basename "$DTBS")

          cp "$KERNEL" "/tmp/tarball-staging/boot/nixos/$KERNEL_NAME"
          cp "$INITRD" "/tmp/tarball-staging/boot/nixos/$INITRD_NAME"
          cp -r "$DTBS" "/tmp/tarball-staging/boot/nixos/$DTBS_NAME"

          # Generate extlinux.conf
          KERNEL_PARAMS=$(cat "$MIGRATION_PATH/kernel-params")
          cat > /tmp/tarball-staging/boot/extlinux/extlinux.conf <<EXTEOF
          TIMEOUT 0
          DEFAULT nixos-default

          LABEL nixos-default
            MENU LABEL NixOS - Default
            LINUX ../nixos/$KERNEL_NAME
            INITRD ../nixos/$INITRD_NAME
            APPEND init=$MIGRATION_PATH/init $KERNEL_PARAMS
            FDT ../nixos/$DTBS_NAME/broadcom/bcm2711-rpi-4-b.dtb
          EXTEOF

          echo "Boot partition assembled"
          du -sh /tmp/tarball-staging/boot/

      - name: Assemble rootfs from closure
        run: |
          set -euo pipefail
          mkdir -p /tmp/tarball-staging/rootfs/nix/var/nix/{db,gcroots,profiles}

          # Copy nix store closure via tar (faster than per-path cp)
          echo "Copying nix store closure..."
          CLOSURE_COUNT=$(nix-store -qR "$MIGRATION_PATH" | wc -l)
          echo "Closure contains $CLOSURE_COUNT store paths"
          nix-store -qR "$MIGRATION_PATH" \
            | tar -cf - -T - \
            | tar -xf - -C /tmp/tarball-staging/rootfs

          # System profile symlink
          ln -s "$MIGRATION_PATH" /tmp/tarball-staging/rootfs/nix/var/nix/profiles/system

          # Nix DB registration (loaded by nix-path-registration service on first boot)
          echo "Generating Nix DB registration..."
          nix-store --dump-db $(nix-store -qR "$MIGRATION_PATH") \
            > /tmp/tarball-staging/rootfs/nix-path-registration

          # First-boot target: full system to download from cache.pifinder.eu
          mkdir -p /tmp/tarball-staging/rootfs/var/lib/pifinder
          echo "$FULL_PATH" > /tmp/tarball-staging/rootfs/var/lib/pifinder/first-boot-target

          # PiFinder data directory
          mkdir -p /tmp/tarball-staging/rootfs/home/pifinder/PiFinder_data

          echo "Rootfs assembled"
          du -sh /tmp/tarball-staging/rootfs/

      - name: Create migration tarball
        run: |
          TARBALL="pifinder-nixos-v${VERSION}.tar.zst"

          UNCOMPRESSED_MB=$(du -sm /tmp/tarball-staging | awk '{print $1}')
          echo "Uncompressed staging: ${UNCOMPRESSED_MB} MB"

          # Force root ownership: the closure was extracted as the non-root CI
          # user (so the staging tree is uid 1000), and tar would otherwise bake
          # that into the tarball. The device then ends up with non-root
          # /nix/store paths, which makes NetworkManager refuse its wifi plugin.
          tar -C /tmp/tarball-staging --owner=0 --group=0 --numeric-owner \
            -cf - boot rootfs \
            | zstd -T0 -19 -o "/tmp/${TARBALL}"
          sudo rm -rf /tmp/tarball-staging

          echo "TARBALL=/tmp/${TARBALL}" >> "$GITHUB_ENV"
          echo "TARBALL_NAME=${TARBALL}" >> "$GITHUB_ENV"

          sha256sum "/tmp/${TARBALL}" | awk '{print $1}' > "/tmp/${TARBALL}.sha256"
          echo "SHA256=$(cat /tmp/${TARBALL}.sha256)" >> "$GITHUB_ENV"

          SIZE_MB=$(( $(stat -c%s "/tmp/${TARBALL}") / 1048576 ))
          echo "SIZE_MB=${SIZE_MB}" >> "$GITHUB_ENV"

          echo "### Migration Tarball Built" >> "$GITHUB_STEP_SUMMARY"
          echo "- **File:** ${TARBALL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Uncompressed:** ${UNCOMPRESSED_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Compressed:** ${SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** \`$(cat /tmp/${TARBALL}.sha256)\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Method:** direct closure assembly (no SD image)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARBALL_NAME }}
          path: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-migration
          name: PiFinder NixOS Migration v${{ env.VERSION }}
          body: |
            NixOS migration tarball (boot + rootfs, no catalog images).
            Assembled from nix store closure with first-boot deferred download.

            **Size:** ${{ env.SIZE_MB }} MB
            **SHA256:** `${{ env.SHA256 }}`
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256
