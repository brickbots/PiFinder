name: Build PiFinder NixOS

on:
  push:
    branches: [main, nixos]
  pull_request:
    types: [labeled, synchronize, opened]
  workflow_dispatch:
    inputs:
      migration_version:
        description: "Migration tarball version tag (e.g. 2.5.0)"
        required: false
        default: "2.5.0"
        type: string

concurrency:
  group: build-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Try Pi5 native build first (fast)
  build-native:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      contains(github.event.pull_request.labels.*.name, 'testable')
    runs-on: [self-hosted, aarch64]
    timeout-minutes: 30
    outputs:
      success: ${{ steps.build.outcome == 'success' }}
      store_path: ${{ steps.push.outputs.store_path }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: pifinder
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build NixOS system closure
        id: build
        run: |
          nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            -L --no-link

      - name: Push to Cachix
        id: push
        run: |
          STORE_PATH=$(nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            --json | jq -r '.[].outputs.out')
          echo "$STORE_PATH" | cachix push pifinder
          echo "store_path=$STORE_PATH" >> "$GITHUB_OUTPUT"

  # Wait up to 15 min for native builder, then decide on fallback
  native-wait:
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.pull_request.labels.*.name, 'preview') ||
      contains(github.event.pull_request.labels.*.name, 'testable')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      need_emulated: ${{ steps.wait.outputs.need_emulated }}
    steps:
      - name: Wait for native build
        id: wait
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for i in $(seq 1 30); do
            sleep 30
            RESULT=$(gh api "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs" \
              --jq '.jobs[] | select(.name == "build-native") | .conclusion // "pending"' 2>/dev/null || echo "pending")
            echo "Check $i/30: build-native=$RESULT"
            if [ "$RESULT" = "success" ]; then
              echo "need_emulated=false" >> "$GITHUB_OUTPUT"
              exit 0
            elif [ "$RESULT" = "failure" ] || [ "$RESULT" = "cancelled" ]; then
              echo "need_emulated=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done
          echo "Native build not done after 15 min, falling back to emulated"
          echo "need_emulated=true" >> "$GITHUB_OUTPUT"

  # Fallback to QEMU emulation if Pi5 unavailable or slow
  build-emulated:
    needs: native-wait
    if: needs.native-wait.outputs.need_emulated == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      store_path: ${{ steps.push.outputs.store_path }}
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            extra-platforms = aarch64-linux
            extra-system-features = big-parallel

      - uses: cachix/cachix-action@v15
        with:
          name: pifinder
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Register QEMU binfmt for aarch64
        run: sudo apt-get update && sudo apt-get install -y qemu-user-static

      - name: Build NixOS system closure
        run: |
          nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            --system aarch64-linux \
            -L --no-link

      - name: Push to Cachix
        id: push
        run: |
          STORE_PATH=$(nix build .#nixosConfigurations.pifinder.config.system.build.toplevel \
            --system aarch64-linux \
            --json | jq -r '.[].outputs.out')
          echo "$STORE_PATH" | cachix push pifinder
          echo "store_path=$STORE_PATH" >> "$GITHUB_OUTPUT"

  # Commit pifinder-build.json with store path to the same branch
  stamp-build:
    needs: [build-native, build-emulated]
    if: always() && (needs.build-native.result == 'success' || needs.build-emulated.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Write pifinder-build.json
        run: |
          STORE_PATH="${{ needs.build-native.outputs.store_path || needs.build-emulated.outputs.store_path }}"
          BRANCH="${{ github.head_ref || github.ref_name }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          PR_NUMBER="${{ github.event.pull_request.number }}"
          if [ -n "$PR_NUMBER" ]; then
            VERSION="PR#${PR_NUMBER}-${SHORT_SHA}"
          else
            VERSION="${BRANCH}-${SHORT_SHA}"
          fi
          jq -n --arg sp "$STORE_PATH" --arg v "$VERSION" \
            '{store_path: $sp, version: $v}' > pifinder-build.json

      - name: Commit pifinder-build.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pifinder-build.json
          git diff --staged --quiet || git commit -m "chore: stamp build [skip ci]"
          git push

  # Build migration tarball — only on nixos branch pushes
  build-migration-tarball:
    needs: [build-native, build-emulated]
    if: |
      always() &&
      github.ref == 'refs/heads/nixos' &&
      (needs.build-native.result == 'success' || needs.build-emulated.result == 'success')
    runs-on: [self-hosted, aarch64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/cachix-action@v15
        with:
          name: pifinder
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Set version
        run: |
          if [ -n "${{ inputs.migration_version }}" ]; then
            echo "VERSION=${{ inputs.migration_version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=2.5.0" >> "$GITHUB_ENV"
          fi

      - name: Resolve full system store path
        run: |
          FULL_PATH="${{ needs.build-native.outputs.store_path || needs.build-emulated.outputs.store_path }}"
          echo "FULL_PATH=$FULL_PATH" >> "$GITHUB_ENV"
          echo "Full system toplevel: $FULL_PATH"

      - name: Build migration SD image
        run: |
          nix build .#images.pifinder-migration --print-out-paths > /tmp/image_path
          echo "IMAGE_PATH=$(cat /tmp/image_path)" >> "$GITHUB_ENV"

      - name: Clean up previous runs
        run: |
          sudo umount /mnt/boot /mnt/root 2>/dev/null || true
          sudo losetup -D 2>/dev/null || true
          sudo rm -rf /tmp/tarball-staging /tmp/pifinder.img /mnt/boot /mnt/root
          rm -f /tmp/pifinder-nixos-*.tar.zst /tmp/pifinder-nixos-*.tar.zst.sha256

      - name: Extract boot and rootfs from image
        run: |
          IMAGE_FILE=$(find "$IMAGE_PATH" -type f \( -name "*.img" -o -name "*.img.zst" \) | head -1)
          echo "Found image: $IMAGE_FILE"

          if [[ "${IMAGE_FILE}" == *.zst ]]; then
            zstd -d "${IMAGE_FILE}" -o /tmp/pifinder.img
          else
            cp "${IMAGE_FILE}" /tmp/pifinder.img
          fi

          LOOP=$(sudo losetup --find --show --partscan /tmp/pifinder.img)

          sudo mkdir -p /mnt/boot /mnt/root
          sudo mount "${LOOP}p1" /mnt/boot
          sudo mount "${LOOP}p2" /mnt/root

          mkdir -p /tmp/tarball-staging
          sudo cp -a /mnt/boot /tmp/tarball-staging/boot
          sudo cp -a /mnt/root /tmp/tarball-staging/rootfs

          sudo umount /mnt/boot /mnt/root
          sudo losetup -d "${LOOP}"
          rm -f /tmp/pifinder.img

      - name: Inject first-boot target
        run: |
          sudo mkdir -p /tmp/tarball-staging/rootfs/var/lib/pifinder
          echo "$FULL_PATH" | sudo tee /tmp/tarball-staging/rootfs/var/lib/pifinder/first-boot-target

      - name: Create migration tarball
        run: |
          TARBALL="pifinder-nixos-v${VERSION}.tar.zst"

          UNCOMPRESSED_MB=$(sudo du -sm /tmp/tarball-staging | awk '{print $1}')
          echo "Uncompressed staging: ${UNCOMPRESSED_MB} MB"

          sudo tar -C /tmp/tarball-staging -cf - \
            --exclude='*/lost+found' \
            boot rootfs | zstd -T0 -19 -o "/tmp/${TARBALL}"
          sudo rm -rf /tmp/tarball-staging

          echo "TARBALL=/tmp/${TARBALL}" >> "$GITHUB_ENV"
          echo "TARBALL_NAME=${TARBALL}" >> "$GITHUB_ENV"

          sha256sum "/tmp/${TARBALL}" | awk '{print $1}' > "/tmp/${TARBALL}.sha256"
          echo "SHA256=$(cat /tmp/${TARBALL}.sha256)" >> "$GITHUB_ENV"

          SIZE_MB=$(( $(stat -c%s "/tmp/${TARBALL}") / 1048576 ))
          echo "SIZE_MB=${SIZE_MB}" >> "$GITHUB_ENV"

          echo "### Migration Tarball Built" >> "$GITHUB_STEP_SUMMARY"
          echo "- **File:** ${TARBALL}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Uncompressed:** ${UNCOMPRESSED_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Compressed:** ${SIZE_MB} MB" >> "$GITHUB_STEP_SUMMARY"
          echo "- **SHA256:** \`$(cat /tmp/${TARBALL}.sha256)\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARBALL_NAME }}
          path: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}-migration
          name: PiFinder NixOS Migration v${{ env.VERSION }}
          body: |
            NixOS migration tarball (boot + rootfs, no catalog images).
            Extracted from migration SD image with first-boot deferred download.

            **Size:** ${{ env.SIZE_MB }} MB
            **SHA256:** `${{ env.SHA256 }}`
          files: |
            ${{ env.TARBALL }}
            ${{ env.TARBALL }}.sha256

      - name: Update migration branch with new SHA256
        run: |
          git fetch origin migration
          git checkout migration
          sed -i "s/\"migration_size_mb\": [0-9]*/\"migration_size_mb\": ${SIZE_MB}/" python/PiFinder/ui/software.py
          sed -i "s/\"migration_sha256\": \"[a-f0-9]*/\"migration_sha256\": \"${SHA256}/" python/PiFinder/ui/software.py
          if git diff --quiet; then
            echo "No changes needed"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add python/PiFinder/ui/software.py
            git commit -m "fix: auto-update migration tarball SHA256 and size"
            git push origin migration
          fi
